services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: prep_tracker
      POSTGRES_USER: prep
      POSTGRES_PASSWORD: ${DB_PASSWORD:-preppass123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prep -d prep_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DATABASE_URL: jdbc:postgresql://db:5432/prep_tracker
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: prep_tracker
      DATABASE_USERNAME: prep
      DATABASE_PASSWORD: ${DB_PASSWORD:-preppass123}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-at-least-32-chars}
      FRONTEND_URL: ${APP_URL:-http://localhost}
      CORS_ORIGINS: ${APP_URL:-http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-google-client-secret}

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  pgdata:
