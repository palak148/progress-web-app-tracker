server:
  port: 8080

spring:
  application:
    name: prep-tracker
  datasource:
    url: jdbc:h2:file:./data/prep-tracker;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile
        provider:
          google:
            user-name-attribute: email

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-long-random-string-at-least-256-bits}
    expiration-ms: 86400000
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cors-allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:prep_tracker}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: false
